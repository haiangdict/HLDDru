<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLDDruпҪңжө·зӣҺйӯҜеҮұиӘһеӯёзҝ’иҫӯе…ё</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'jf-openhuninn';
  src: url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@v2.1/font/jf-openhuninn-2.1.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@v2.1/font/jf-openhuninn-2.1.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --accent: #d4a843;
  --accent2: #8bc4a8;
  --text: #e8e4dc;
  --muted: #777;
  --playing: #8bc4a8;
}

/* в”Җв”Җ LIGHT MODE в”Җв”Җ */
body.light {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #ede9e3;
  --border: #d4cfc8;
  --text: #1a1814;
  --muted: #666;
}
body.light header { background: rgba(245,243,239,0.96); }
body.light .content-info { background: var(--bg); }
body.light .letter-hdr { background: var(--bg); }

/* в”Җв”Җ FONT SIZE SCALE в”Җв”Җ */
body.fs-sm  { font-size: 0.88rem; }
body.fs-md  { font-size: 1rem;    }
body.fs-lg  { font-size: 1.13rem; }
body.fs-xl  { font-size: 1.28rem; }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'jf-openhuninn', 'Noto Serif TC', serif;
  min-height: 100vh;
}

/* в”Җв”Җ HEADER в”Җв”Җ */
header {
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(14,14,14,0.96);
  backdrop-filter: blur(12px);
  z-index: 200;
  gap: 12px;
  flex-wrap: wrap;
}
.logo { display: flex; flex-direction: column; gap: 2px; }
.logo-main { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.05em; color: var(--accent); font-family: 'Noto Serif TC', serif; }
.logo-sub { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

.ui-ctrl-btn {
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 5px 10px; border-radius: 20px;
  cursor: pointer; transition: all 0.15s; display:flex; align-items:center; gap:5px;
}
.ui-ctrl-btn:hover { border-color: var(--accent2); color: var(--text); }

.fs-ctrl {
  display:flex; align-items:center; gap:3px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 6px;
}
.fs-btn {
  font-family: 'Space Mono', monospace; font-size: 0.72rem;
  background: transparent; border: none;
  color: var(--muted); padding: 2px 6px; border-radius: 14px;
  cursor: pointer; transition: all 0.13s; line-height:1;
}
.fs-btn:hover { color: var(--text); background: var(--surface); }
.fs-btn.active { background: var(--accent2); color: #0e0e0e; font-weight:700; }
.fs-divider { width:1px; height:14px; background:var(--border); flex-shrink:0; }

.header-ctrls { display:flex; gap:9px; align-items:center; flex-wrap:wrap; }

/* в”Җв”Җ LAYOUT в”Җв”Җ */
.main { display: flex; height: calc(100vh - 66px); position: relative; }

/* в”Җв”Җ SIDEBAR (A-Z) в”Җв”Җ */
.sidebar {
  width: 68px; min-width: 68px; border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg); flex-shrink: 0;
  display: flex; flex-direction: column; padding: 6px 0;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.az-btn {
  display:block; width:100%; text-align:center; padding:9px 0;
  font-family:'Space Mono',monospace; font-size:0.88rem; font-weight:700;
  color:var(--muted); cursor:pointer; background:none; border:none;
  border-left:3px solid transparent; transition: all 0.15s;
  text-transform: uppercase;
}
.az-btn:hover { color:var(--accent); background:var(--surface); }
.az-btn.active { color:var(--accent2); border-left-color:var(--accent2); background:var(--surface); }

/* в”Җв”Җ CONTENT в”Җв”Җ */
.content { flex: 1; overflow-y: auto; }
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.content-info {
  font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted);
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.content-info span { color: var(--accent); }

.letter-hdr {
  position: sticky; top: 0; z-index: 6;
  background: var(--bg);
  padding: 8px 20px;
  font-family: 'Noto Serif TC', serif;
  font-weight: 900; font-size: 1.5rem; letter-spacing: 0.04em;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}

.letter-group {
  display: grid;
  gap: 10px;
  padding: 10px 20px;
}

.lemma-entry {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px 14px;
  transition: background 0.15s;
}
.lemma-entry:hover { background: var(--surface); }

.word-row {
  display: flex; align-items: center; gap: 8px;
}

.word-main {
  font-family: 'jf-openhuninn', 'Noto Serif TC', serif;
  font-size: 1.12em;
  color: var(--accent);
  letter-spacing: 0.01em;
}
.ne-tag { opacity: 0.25; font-weight: 400; }

/* в”Җв”Җ SENSES в”Җв”Җ */
.sense-list { margin: 6px 0 0 20px; }
.sense-item { padding: 5px 0; }
.sense-item + .sense-item { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 8px; }
.sense-head {
  display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap;
}
.sense-num { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); }
.level-icons { color: var(--accent2); letter-spacing: 1px; font-size: 0.85em; font-family: 'Space Mono', monospace; }
.sense-trans { font-size: 1em; color: var(--text); }

/* в”Җв”Җ REFERENCE FIELDS (иҝ‘зҫ©и©һ/еҸҚзҫ©и©һ/зӣёй—ңи©һ/йҷ„иЁ») в”Җв”Җ */
.ref-row { margin-top: 4px; font-size: 0.88em; color: var(--muted); line-height: 1.6; }
.ref-label {
  display: inline-block;
  font-family: 'Space Mono', monospace; font-size: 0.66rem;
  color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 8px; margin-right: 6px;
}

/* в”Җв”Җ EXAMPLE SENTENCES в”Җв”Җ */
.example-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 10px;
  margin-top: 8px;
}
.example-row { display: flex; align-items: center; gap: 8px; }
.example-sentence { flex: 1; color: var(--text); font-size: 1em; line-height: 1.7; }
.example-trans { margin-top: 4px; color: var(--text); opacity: 0.85; font-size: 0.92em; line-height: 1.6; padding-right: 40px; }
.example-source {
  margin-top: 4px; text-align: right;
  font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted);
}
.term-highlight { color: var(--accent); font-weight: 600; margin: 0 0.15em; }

/* в”Җв”Җ ETYMOLOGY BLOCK в”Җв”Җ */
.ety-block {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  padding: 7px 12px;
  margin: 6px 0 6px 20px;
  font-size: 0.92em;
  color: var(--muted);
  line-height: 1.6;
}
.sense-item .ety-block { margin: 4px 0 6px 0; }
.ety-lang { margin-right: 0.35em; }
.ety-word {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
}
.ety-word:hover { text-decoration: underline; }

/* в”Җв”Җ PLAY BUTTON (same design as index.html) в”Җв”Җ */
.play-btn {
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid var(--border); background:transparent; color:var(--muted);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; transition:all 0.18s; flex-shrink:0;
}
.play-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(212,168,67,0.08); }
.play-btn.active { border-color:var(--playing); color:var(--playing); background:rgba(139,196,168,0.1); }
.play-btn:disabled { opacity:0.22; cursor:not-allowed; }

/* в”Җв”Җ EMPTY / LOADING в”Җв”Җ */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:80px 20px; color:var(--muted); font-family:'Space Mono',monospace; font-size:0.8rem; }
.empty-icon { font-size:2rem; opacity:0.5; }

/* в”Җв”Җ TOAST в”Җв”Җ */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 9px 18px; border-radius: 20px; font-family:'Space Mono',monospace; font-size:0.7rem;
  opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 500;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* в”Җв”Җ MOBILE в”Җв”Җ */
@media (max-width: 640px) {
  header { padding: 12px 16px; }
  .main { flex-direction: column; height: auto; }
  .sidebar {
    width: 100%; min-width: 0; flex-direction: row;
    overflow-x: auto; overflow-y: hidden; padding: 4px 8px;
    border-right: none; border-bottom: 1px solid var(--border);
  }
  .az-btn { flex: 0 0 auto; padding: 8px 11px; border-left: none; border-bottom: 3px solid transparent; }
  .az-btn.active { border-left-color: transparent; border-bottom-color: var(--accent2); }
  .content { height: auto; }
}
</style>

    <div class="logo-sub">жө·зӣҺйӯҜеҮұиӘһеӯёзҝ’иҫӯе…ё В· Haiang Learner's Dictionary of Rukai</div>
  </div>
  <div class="header-ctrls">

      <button class="fs-btn" id="fs-sm" onclick="setFontSize('sm')" title="е°Ҹ">A</button>

    <button class="ui-ctrl-btn" id="themeBtn" onclick="toggleTheme()" title="еҲҮжҸӣж·ұиүІ/ж·әиүІжЁЎејҸ">рҹҢҷ</button>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content">
    <div class="empty"><div class="empty-icon">вҹі</div><div>ијүе…ҘиіҮж–ҷдёӯвҖҰ</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
const AUDIO_BASE = 'https://pub-44bec38ae2824f519a8519301efe3bd7.r2.dev/';
const LEMMATA_URL = './data/08-Lemmata.csv';
const SENSES_URL = './data/08-Senses.csv';
const ETYMOLOGY_URL = './data/08-Etymology.csv';
const EXAMPLES_URL = './data/08-Examples.csv';

let entries = [];          // Lemmata rows
let lemmataById = {};       // id -> entry
let sensesByLemma = {};     // id -> [sense objects]
let etymologyByCode = {};   // code -> etymology object
let examplesBySense = {};   // зҫ©й … id -> [example objects]

const LEVEL_ICONS = { 'B': 'вҳ…вҳ…вҳ…вҳ…', 'I': 'вҳ…вҳ…вҳ…вҳҶ', 'S': 'вҳ…вҳ…вҳҶвҳҶ', 'U': 'вҳ…вҳҶвҳҶвҳҶ' };

// в”Җв”Җ CSV parsing (handles quoted fields, keeps blank-header column) в”Җв”Җ
function parseCSV(text) {
  const lines = text.replace(/^\ufeff/, '').trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    return cols;
  });
  return { headers, rows };
}

function rowsToObjects(headers, rows) {
  return rows.map(cols => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
    return obj;
  });
}

function firstLetter(word) {
  let w = (word || '').trim();
  if (w.startsWith('\u2019')) w = w.slice(1); // leading glottal-stop mark not used for indexing
  return w ? w[0].toLowerCase() : '#';
}

async function loadData() {
  try {
    const [lemmataText, sensesText, etymologyText, examplesText] = await Promise.all([
      fetch(LEMMATA_URL, { cache: 'no-cache' }).then(r => r.text()),
      fetch(SENSES_URL, { cache: 'no-cache' }).then(r => r.ok ? r.text() : ''),
      fetch(ETYMOLOGY_URL, { cache: 'no-cache' }).then(r => r.ok ? r.text() : ''),
      fetch(EXAMPLES_URL, { cache: 'no-cache' }).then(r => r.ok ? r.text() : '')
    ]);

    // в”Җв”Җ Lemmata в”Җв”Җ
    const lem = parseCSV(lemmataText);
    const idxId = lem.headers.indexOf('з·Ёиҷҹ');
    const idxWord = lem.headers.indexOf('и©һиӘһ');
    const idxDial = lem.headers.indexOf('иӘһеҲҘ');
    const idxAudio = lem.headers.indexOf('йҹіжӘ”');
    const idxNe = idxWord + 1; // unnamed column immediately right of headword flags "ne"

    entries = lem.rows.map(cols => {
      const word = (cols[idxWord] || '').trim();
      const id = (cols[idxId] || '').trim();
      return {
        id,
        word,
        letter: firstLetter(word),
        ne: (cols[idxNe] || '').trim() === 'ne',
        dial: (cols[idxDial] || '').trim(),
        audioFile: (cols[idxAudio] || '').trim()
      };
    }).filter(e => e.word);

    lemmataById = {};
    entries.forEach(e => { if (e.id) lemmataById[e.id] = e; });

    // в”Җв”Җ Senses в”Җв”Җ
    sensesByLemma = {};
    if (sensesText) {
      const sn = parseCSV(sensesText);
      const senseObjs = rowsToObjects(sn.headers, sn.rows);
      senseObjs.forEach(s => {
        const id = s['з·Ёиҷҹ'];
        if (!id) return;
        (sensesByLemma[id] = sensesByLemma[id] || []).push(s);
      });
    }

    // в”Җв”Җ Etymology в”Җв”Җ
    etymologyByCode = {};
    if (etymologyText) {
      const et = parseCSV(etymologyText);
      const etyObjs = rowsToObjects(et.headers, et.rows);
      etyObjs.forEach(row => {
        const code = row['з·Ёиҷҹ'];
        if (code) etymologyByCode[code] = row;
      });
    }

    // в”Җв”Җ Examples в”Җв”Җ
    examplesBySense = {};
    if (examplesText) {
      const ex = parseCSV(examplesText);
      const exObjs = rowsToObjects(ex.headers, ex.rows);
      exObjs.forEach(row => {
        const senseId = row['зҫ©й …'];
        if (!senseId) return;
        (examplesBySense[senseId] = examplesBySense[senseId] || []).push(row);
      });
    }

    buildSidebar();
    renderContent();
    layoutLetterGrids();
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="empty-icon">вҡ </div><div>иіҮж–ҷијүе…ҘеӨұж•—пјҢи«ӢзўәиӘҚ data иіҮж–ҷеӨҫе…§зҡ„ csv жҳҜеҗҰеӯҳеңЁ</div></div>';
  }
}

// в”Җв”Җ Grid layout: same-row entries share equal height, row-first fill (leftвҶ’right) в”Җв”Җ
function layoutLetterGrids() {
  document.querySelectorAll('.letter-group').forEach(group => {
    const items = group.children.length;
    if (!items) return;
    const width = group.clientWidth || (group.parentElement ? group.parentElement.clientWidth : 340);
    const columns = Math.max(1, Math.floor(width / 340));
    group.style.gridAutoFlow = 'row';
    group.style.gridTemplateColumns = `repeat(${columns}, minmax(0, 1fr))`;
  });
}

let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(layoutLetterGrids, 150);
});

function buildSidebar() {
  const letters = [...new Set(entries.map(e => e.letter))].sort();
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = letters.map(l =>
    `<button class="az-btn" id="az-${l}" onclick="jumpToLetter('${l}')">${l}</button>`
  ).join('');
}

// дҫқйҹіжӘ”жӘ”еҗҚеҲӨж–·еҜҰйҡӣеӯҳж”ҫзҡ„иіҮж–ҷеӨҫйЎһеҲҘпјҲиҰӢе°ҲжЎҲеҲҶжөҒиҰҸеүҮпјү
function resolveAudioCategory(filename, dial) {
  const base = filename.replace(/\.mp3$/i, '');
  if (/[A-Za-z]/.test(base)) return 'D'; // .mp3еүҚжңүжӢүдёҒеӯ—жҜҚ
  if (!/^\d+$/.test(base)) return null;  // йқһй җжңҹж јејҸ

  const dialPadded = dial.length === 1 ? ('0' + dial) : dial;
  const prefixMap = { '1': 'T', '2': 'P', '3': 'V', '4': 'R', '5': 'W' };
  for (const prefix in prefixMap) {
    const expected = prefix + dialPadded;
    if (base.length === expected.length + 4 && base.startsWith(expected)) {
      return prefixMap[prefix];
    }
  }
  // {иӘһеҲҘд»Јзўј}+4зўј вҶ’ CпјҲж–№иЁҖеҲҘзӮәеҖӢдҪҚж•ёжҷӮдёҚиЈң0пјҢеүҚж–№з„Ўжі•иЈң0пјү
  if (base.length === dial.length + 4 && base.startsWith(dial)) {
    return 'C';
  }
  return null;
}

function audioUrl(e) {
  if (!e.audioFile || !e.dial) return '';
  const cat = resolveAudioCategory(e.audioFile, e.dial);
  if (!cat) return '';
  return AUDIO_BASE + e.dial + '/' + cat + '/' + e.audioFile;
}

function renderContent() {
  const content = document.getElementById('content');
  let html = `<div class="content-info"><span>${entries.length.toLocaleString()}</span> зӯҶи©һжўқ</div>`;
  let lastLetter = null;
  entries.forEach((e, idx) => {
    if (e.letter !== lastLetter) {
      if (lastLetter !== null) html += '</div>'; // close previous letter-group
      html += `<div class="letter-hdr" id="letter-${e.letter}" data-letter="${e.letter}">${e.letter}</div>`;
      html += `<div class="letter-group">`;
      lastLetter = e.letter;
    }
    const url = audioUrl(e);
    const hasAudio = !!url;
    html += `<div class="lemma-entry" id="lemma-${e.id}">
      <div class="word-row">
        <div class="word-main">${escapeHtml(e.word)}${e.ne ? '<span class="ne-tag">ne</span>' : ''}</div>
        <button class="play-btn" ${hasAudio ? '' : 'disabled'}
          title="${hasAudio ? 'ж’ӯж”ҫйҹіжӘ”' : 'з„ЎйҹіжӘ”'}"
          onclick="togglePlay('${url.replace(/'/g, "\\'")}', this)">${hasAudio ? 'в–¶' : 'вҖ”'}</button>
      </div>
      ${renderSenseSection(e.id)}
    </div>`;
  });
  if (lastLetter !== null) html += '</div>'; // close final letter-group
  content.innerHTML = html;
  observeLetters();
}

// в”Җв”Җ Senses + Etymology rendering в”Җв”Җ
function renderSenseSection(lemmaId) {
  const senses = sensesByLemma[lemmaId];
  if (!senses || !senses.length) return '';

  const multi = senses.length > 1;
  const senseEtyRaw = senses.map(s => (s['иӘһжәҗ'] || '').trim());
  const senseEtyResolved = senseEtyRaw.map(raw => raw ? resolveEtymologyField(raw) : null);

  const shared = senseEtyRaw.every(r => r && r === senseEtyRaw[0]) && senseEtyResolved[0];

  let html = '';
  if (shared) {
    html += `<div class="ety-block">${senseEtyResolved[0].html}</div>`;
  }

  html += '<div class="sense-list">';
  senses.forEach((s, idx) => {
    const num = multi ? `<span class="sense-num">${idx + 1}.</span>` : '';
    const lvl = LEVEL_ICONS[(s['зӯүзҙҡ'] || '').trim()] || '';
    const pos = (s['и©һйЎһ'] || '').trim();
    const trans = (s['зҝ»иӯҜ'] || '').trim();
    html += `<div class="sense-item">`;
    if (!shared && senseEtyResolved[idx]) {
      html += `<div class="ety-block">${senseEtyResolved[idx].html}</div>`;
    }
    html += `<div class="sense-head">${num}${lvl ? `<span class="level-icons">${lvl}</span>` : ''}${pos ? `<span class="ref-label">${escapeHtml(pos)}</span>` : ''}${trans ? `<span class="sense-trans">${escapeHtml(trans)}</span>` : ''}</div>`;
    const exList = examplesBySense[s['зҫ©й …']];
    if (exList && exList.length) {
      html += exList.map(renderExampleBlock).join('');
    }
    html += renderNumericRefLine('иҝ‘зҫ©и©һ', s['иҝ‘зҫ©и©һ']);
    html += renderNumericRefLine('еҸҚзҫ©и©һ', s['еҸҚзҫ©и©һ']);
    html += renderNumericRefLine('зӣёй—ңи©һ', s['зӣёй—ңи©һ']);
    html += renderNoteLine(s['йҷ„иЁ»']);
    html += `</div>`;
  });
  html += '</div>';
  return html;
}

function exampleAudioUrl(ex) {
  if (!ex['йҹіжӘ”'] || !ex['иӘһеҲҘ']) return '';
  const cat = resolveAudioCategory(ex['йҹіжӘ”'], ex['иӘһеҲҘ']);
  if (!cat) return '';
  return AUDIO_BASE + ex['иӘһеҲҘ'] + '/' + cat + '/' + ex['йҹіжӘ”'];
}

function renderExampleBlock(ex) {
  const url = exampleAudioUrl(ex);
  const hasAudio = !!url;
  const sentenceHtml = highlightTerm(ex['иӘһеҸҘ'] || '', ex['и©һиӘһ'] || '');
  const transHtml = highlightTerm(ex['иӘһеҸҘзҝ»иӯҜ'] || '', ex['зҝ»иӯҜ'] || '');
  const source = ex['еҮәиҷ•'] || '';
  return `<div class="example-block">
    <div class="example-row">
      <div class="example-sentence">${sentenceHtml}</div>
      <button class="play-btn" ${hasAudio ? '' : 'disabled'}
        title="${hasAudio ? 'ж’ӯж”ҫйҹіжӘ”' : 'з„ЎйҹіжӘ”'}"
        onclick="togglePlay('${url.replace(/'/g, "\\'")}', this)">${hasAudio ? 'в–¶' : 'вҖ”'}</button>
    </div>
    ${transHtml ? `<div class="example-trans">${transHtml}</div>` : ''}
    ${source ? `<div class="example-source">пјҲ${escapeHtml(source)}пјү</div>` : ''}
  </div>`;
}

// еңЁж–Үеӯ—дёӯжүҫеҮәзӣ®жЁҷи©һеҪҷ/зҝ»иӯҜпјҢеҘ—дёҠйҮ‘иүІпјӢеүҚеҫҢй–“и·қпјҲз”Ёж–јдҫӢеҸҘ/дҫӢеҸҘзҝ»иӯҜзҡ„е‘јжҮүжЁҷзӨәпјү
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlightTerm(text, term) {
  if (!term) return escapeHtml(text);
  const re = new RegExp(escapeRegex(term), 'g');
  let result = '', lastIndex = 0, m;
  while ((m = re.exec(text)) !== null) {
    result += escapeHtml(text.slice(lastIndex, m.index));
    result += `<span class="term-highlight">${escapeHtml(m[0])}</span>`;
    lastIndex = m.index + m[0].length;
    if (m[0].length === 0) { re.lastIndex++; }
  }
  result += escapeHtml(text.slice(lastIndex));
  return result;
}

// иҝ‘зҫ©и©һ/еҸҚзҫ©и©һ/зӣёй—ңи©һпјҡи·ҹиӘһжәҗзҡ„гҖҢзҙ”ж•ёеӯ—гҖҚи§Јжһҗж–№ејҸзӣёеҗҢпјҲйҖЈзөҗи©һзӣ®пјӢйЎҜзӨәзҝ»иӯҜпјүпјҢеүҚйқўеҠ жЁҷзұӨ
function renderNumericRefLine(label, raw) {
  raw = (raw || '').trim();
  if (!raw) return '';
  const resolved = raw.split('+').map(t => t.trim()).filter(Boolean)
    .map(resolveEtymologyToken).filter(r => r && r.type === 'numeric');
  if (!resolved.length) return '';
  const inner = resolved.map(renderEtymologyFragment).join(' + ');
  return `<div class="ref-row"><span class="ref-label">${label}</span>${inner}</div>`;
}

// йҷ„иЁ»пјҡзҙ”ж–Үеӯ—пјҢдёҚи§Јжһҗ
function renderNoteLine(raw) {
  raw = (raw || '').trim();
  if (!raw) return '';
  return `<div class="ref-row"><span class="ref-label">йҷ„иЁ»</span>${escapeHtml(raw)}</div>`;
}

// и§Јжһҗе–®дёҖзҫ©й …зҡ„гҖҢиӘһжәҗгҖҚж¬„дҪҚпјҲеҸҜиғҪжҳҜ A+B+C еӨҡзӯҶпјүпјҢеӣһеӮі {html} жҲ– nullпјҲжҹҘз„Ўд»»дҪ•жңүж•ҲдҫҶжәҗпјү
function resolveEtymologyField(raw) {
  const tokens = raw.split('+').map(t => t.trim()).filter(Boolean);
  const resolved = tokens.map(resolveEtymologyToken).filter(Boolean);
  if (!resolved.length) return null;

  const isPureNumeric = resolved.every(r => r.type === 'numeric');
  const inner = resolved.map(renderEtymologyFragment).join(' + ');
  const prefix = isPureNumeric ? '' : 'жәҗж–ј';
  return { html: prefix + inner + 'гҖӮ' };
}

function resolveEtymologyToken(token) {
  // зҙ”ж•ёеӯ—пјҲеҸҜйҒё #зҫ©й …з·ЁиҷҹпјүпјҡжҢҮеҗ‘жң¬и©һе…ёеҸҰдёҖи©һзӣ®пјҢжҲ–и©Іи©һзӣ®дёӢзү№е®ҡзҫ©й …
  const numMatch = token.match(/^(\d{5,6})(?:#(\d+))?$/);
  if (numMatch) {
    const lemmaId = numMatch[1];
    const senseId = numMatch[2];
    const targetLemma = lemmataById[lemmaId];
    if (!targetLemma) return null; // жҹҘз„Ўе°ҚжҮүи©һзӣ®пјҢз•ҘйҒҺжӯӨзӯҶ

    let trans = '';
    if (senseId) {
      const targetSense = (sensesByLemma[lemmaId] || []).find(s => s['зҫ©й …'] === senseId);
      if (!targetSense) return null; // жҹҘз„Ўе°ҚжҮүзҫ©й …пјҢз•ҘйҒҺжӯӨзӯҶ
      trans = (targetSense['зҝ»иӯҜ'] || '').trim();
    } else {
      trans = (sensesByLemma[lemmaId] || [])
        .map(s => (s['зҝ»иӯҜ'] || '').trim()).filter(Boolean).join('пјӣ');
    }
    return { type: 'numeric', id: lemmaId, word: targetLemma.word, trans };
  }

  // жӢүдёҒеӯ—жҜҚ+ж•ёеӯ—пјҡжҢҮеҗ‘ 08-Etymology.csv
  if (/^[A-Za-z]{3}\d+$/.test(token)) {
    const row = etymologyByCode[token];
    if (!row) return null; // жҹҘз„Ўе°ҚжҮүиіҮж–ҷпјҢз•ҘйҒҺжӯӨзӯҶ
    const lang = row['иӘһиЁҖ'];
    const word = row['и©һиӘһ'];
    const t1 = row['иҪүеҜ«1'];
    const t2 = row['иҪүеҜ«2'];
    const trans = row['зҝ»иӯҜ'];
    const url = row[''] || '';

    let translit = '';
    if (lang === 'ж—ҘиӘһ') {
      translit = (t1 && t2) ? (t1 + 'пјҢ' + t2) : (t1 || t2);
    } else {
      translit = t1; // йҷӨж—ҘиӘһеӨ–пјҢе…¶йӨҳиӘһеҲҘ(еҗ«й–©иӘһеҸҠжңӘдҫҶж–°еўһзҡ„иӘһеҲҘ)дёҖеҫӢйЎҜзӨәиҪүеҜ«1
    }

    return {
      type: 'latin',
      lang, word, translit, trans,
      url: (lang === 'еҺҹе§ӢеҚ—еі¶иӘһ' && url) ? url : null
    };
  }

  return null;
}

function renderEtymologyFragment(r) {
  if (r.type === 'numeric') {
    const wordHtml = `<a href="#lemma-${r.id}" class="ety-word" onclick="event.preventDefault();jumpToLemma('${r.id}')">${escapeHtml(r.word)}</a>`;
    return wordHtml + (r.trans ? `гҖҢ${escapeHtml(r.trans)}гҖҚ` : '');
  }
  const langHtml = `<span class="ety-lang">${escapeHtml(r.lang)}</span>`;
  const wordHtml = r.url
    ? `<a href="${r.url}" target="_blank" rel="noopener" class="ety-word">${escapeHtml(r.word)}</a>`
    : `<span class="ety-word">${escapeHtml(r.word)}</span>`;
  const translitHtml = r.translit ? `пјҲ${escapeHtml(r.translit)}пјү` : '';
  const transHtml = r.trans ? `гҖҢ${escapeHtml(r.trans)}гҖҚ` : '';
  return langHtml + wordHtml + translitHtml + transHtml;
}

function jumpToLemma(id) {
  const el = document.getElementById('lemma-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function jumpToLetter(letter) {
  const el = document.getElementById('letter-' + letter);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// в”Җв”Җ Highlight current letter in sidebar while scrolling в”Җв”Җ
let _observer = null;
function observeLetters() {
  if (_observer) _observer.disconnect();
  const hdrs = document.querySelectorAll('.letter-hdr');
  _observer = new IntersectionObserver((entriesObs) => {
    entriesObs.forEach(en => {
      if (en.isIntersecting) {
        document.querySelectorAll('.az-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('az-' + en.target.dataset.letter);
        if (btn) btn.classList.add('active');
      }
    });
  }, { root: document.getElementById('content'), threshold: 0, rootMargin: '0px 0px -85% 0px' });
  hdrs.forEach(h => _observer.observe(h));
}

// в”Җв”Җ Audio playback в”Җв”Җ
let currentAudio = null, currentBtn = null;
function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  if (currentBtn) { currentBtn.textContent = 'в–¶'; currentBtn.classList.remove('active'); }
  currentAudio = null; currentBtn = null;
}
function togglePlay(url, btn) {
  if (!url) return;
  if (currentBtn === btn && currentAudio && !currentAudio.paused) { stopAudio(); return; }
  stopAudio();
  currentAudio = new Audio(url);
  currentBtn = btn;
  btn.textContent = 'вҸё'; btn.classList.add('active');
  currentAudio.onended = stopAudio;
  currentAudio.play().catch(() => {
    showToast('вҡ  йҹіжӘ”з„Ўжі•ж’ӯж”ҫпјҢи«ӢжӘўжҹҘз¶Іи·ҜйҖЈз·ҡ');
    stopAudio();
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// в”Җв”Җ Theme & Font Size в”Җв”Җ
const FS_SIZES = ['sm', 'md', 'lg', 'xl'];
function setFontSize(size, silent) {
  if (!FS_SIZES.includes(size)) size = 'md';
  document.body.className = document.body.className.replace(/\bfs-\w+\b/g, '').trim();
  document.body.classList.add('fs-' + size);
  FS_SIZES.forEach(s => {
    const btn = document.getElementById('fs-' + s);
    if (btn) btn.classList.toggle('active', s === size);
  });
  try { localStorage.setItem('hlddru_fs', size); } catch (e) {}
}
let _theme = 'dark';
function _applyTheme(theme, silent) {
  _theme = theme;
  document.body.classList.toggle('light', theme === 'light');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'light' ? 'рҹҢҷ' : 'вҳҖпёҸ';
  try { localStorage.setItem('hlddru_theme', theme); } catch (e) {}
}
function toggleTheme() { _applyTheme(_theme === 'dark' ? 'light' : 'dark'); }

(function loadPrefs() {
  try {
    setFontSize(localStorage.getItem('hlddru_fs') || 'md');
    const th = localStorage.getItem('hlddru_theme') || 'dark';
    if (th === 'light') _applyTheme('light');
  } catch (e) {}
})();

loadData();
</script>
